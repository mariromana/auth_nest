version: '3.9'

services:
    db:
        container_name: postgresAuth
        image: postgres:16
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '5433:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - backend
    redis:
        container_name: redis
        image: redis:7-alpine
        restart: always
        ports:
            - '6379:6379'
        command: redis-server --requirepass pass123456
        volumes:
            - redis_data:/data
        networks:
            - backend
volumes:
    postgres_data:
    redis_data:
networks:
    backend:
